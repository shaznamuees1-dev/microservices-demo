version: '3.8'

services:
  auth-db:
    image: postgres:16
    environment:
      POSTGRES_DB: authdb
      POSTGRES_USER: auth
      POSTGRES_PASSWORD: authpass
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U auth -d authdb']
      interval: 5s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    ports:
      - '8001:8001'
    environment:
      DATABASE_URL: postgresql://auth:authpass@auth-db:5432/authdb
      SECRET_KEY: supersecretkey123changeInProd
    depends_on:
      auth-db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
